<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — Silvio di Rubbo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #1A1814;
      -webkit-font-smoothing: antialiased;
    }

    /* Matches .pres-btn exactly — starts white for dark cover */
    .deck-exit {
      position: fixed;
      top: 1.5rem;
      right: 2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.45);
      background: transparent;
      border: 1px solid rgba(255,255,255,.2);
      padding: 0.45rem 0.75rem;
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s;
      z-index: 200;
    }

    .deck-exit:hover {
      color: rgba(255,255,255,.9);
      border-color: rgba(255,255,255,.5);
    }
  </style>
</head>
<body>

  <a href="{{ '/tastings/' | relative_url }}" class="deck-exit" id="deckExit">← Back to tastings</a>

  {{ content }}

</body>
</html>
