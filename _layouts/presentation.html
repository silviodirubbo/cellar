<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — Silvio di Rubbo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #1A1814;
      -webkit-font-smoothing: antialiased;
    }

    .deck-exit {
      position: fixed;
      top: 1.5rem;
      right: 2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(253,252,250,.4);
      background: none;
      border: 1px solid rgba(253,252,250,.1);
      padding: 0.4rem 0.8rem;
      text-decoration: none;
      transition: all 0.2s ease;
      z-index: 200;
    }

    .deck-exit:hover {
      color: rgba(253,252,250,.9);
      border-color: rgba(253,252,250,.3);
    }
  </style>
</head>
<body>

  <a href="{{ '/tastings/' | relative_url }}" class="deck-exit">← Back to tastings</a>

  {{ content }}

</body>
</html>
