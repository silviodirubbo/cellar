title: Silvio's Cellar
description: Friendly wine tastings in Geneva.
baseurl: "/cellar"
url: "https://silviodirubbo.github.io"

# Build
markdown: kramdown
highlighter: rouge
permalink: pretty

# Excludes
exclude:
  - vendor
  - Gemfile
  - Gemfile.lock
  - scripts
  - README.md

# Collections
collections:
  tastings:
    output: true
    permalink: /tastings/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "tastings"
    values:
      layout: "tasting"
