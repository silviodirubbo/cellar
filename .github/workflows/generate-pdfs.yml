name: Generate Presentation PDFs

# Runs whenever you push changes to _tastings/ or _data/tastings.yml
on:
  push:
    paths:
      - '_tastings/**'
      - '_data/tastings.yml'
  workflow_dispatch: # Also allows manual trigger from GitHub UI

permissions:
  contents: write # Needed to commit the generated PDFs back to the repo

jobs:
  generate-pdfs:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out the repo ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Set up Ruby + Jekyll ───────────────────────────────────────────
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build --baseurl ""
        # We build with empty baseurl so asset paths resolve correctly on localhost

      # ── 3. Set up Node + install Puppeteer ───────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: |
          cd scripts
          npm install puppeteer
          # puppeteer (not puppeteer-core) bundles its own Chrome — no system Chrome needed

      # ── 4. Serve Jekyll site locally ─────────────────────────────────────
      - name: Serve Jekyll site
        run: |
          bundle exec jekyll serve --baseurl "" --no-watch &
          sleep 5  # Wait for server to start
          curl -s http://localhost:4000 > /dev/null && echo "Jekyll is up"

      # ── 5. Generate PDFs for all tastings with slides: true ──────────────
      - name: Generate PDFs
        run: node scripts/generate-all-pdfs.js

      # ── 6. Commit generated PDFs back to repo ────────────────────────────
      - name: Commit PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/tastings/*/presentation.pdf
          git diff --staged --quiet || git commit -m "ci: auto-generate presentation PDFs"
          git push
