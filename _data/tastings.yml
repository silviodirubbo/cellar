# _data/tastings.yml
# ─────────────────────────────────────────────────────────────
# Schema for each tasting:
#
#   slug:              unique identifier, used in URLs
#   title:             full name of the tasting
#   date:              YYYY-MM-DD
#   region:            primary region (displayed as label)
#   description:       one or two sentences, kept short
#   tags:              list of grape/region/theme tags
#   status:            upcoming | past
#   spots_total:       integer (upcoming only)
#   spots_remaining:   integer (upcoming only)
#   cost_estimate:     string e.g. "CHF 25–35 per person"
#   featured:          true | false (shows 2px green border)
#   wines:             list of wines (for presentation slides)
#     - name:
#       producer:
#       vintage:
#       appellation:
#       blend:
#       notes:
#   slides:            auto-generated from wines if present
# ─────────────────────────────────────────────────────────────

- slug: syrah-rhone-cortona
