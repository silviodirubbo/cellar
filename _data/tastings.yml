      blend: "100% Syrah"
    - name: "Saint-Joseph"
      producer: "TBC"
      vintage: 2020
      appellation: "Saint-Joseph AOC"
      blend: "100% Syrah"
    - name: "Châteauneuf-du-Pape"
      producer: "Le Vieux Donjon"
      vintage: 2019
      appellation: "Châteauneuf-du-Pape AOC"
      blend: "Grenache, Syrah, Mourvèdre"

